command_contract_id: context-packet.v1
stable_alias: /context-packet
contract_version: 1

input_artifacts:
  - type: PlanArtifact
    schema: plan.schema.v1
    required: true

output_artifacts:
  - type: ContextPacketArtifact
    schema: context-packet.schema.v1
    required: true

required_validators:
  before:
    - validate-artifact
  after:
    - validate-artifact
    - validate-artifact-path

authority:
  may_create:
    - ContextPacketArtifact
  may_modify:
    - TaskManifest
  may_read:
    - PlanArtifact
    - files_in_plan_scope
    - one_hop_imports_only
  forbidden:
    - edit_source_files
    - modify_schemas
    - modify_policies
    - expand_beyond_one_hop
    - bypass_validation

semantics:
  required:
    - confirm_context_packet_required_is_true
    - load_only_in_scope_files_plus_one_hop
    - save_context_packet_to_declared_path
    - update_task_manifest_phase_and_artifact_refs
