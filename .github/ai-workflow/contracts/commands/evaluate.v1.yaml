command_contract_id: evaluate.v1
stable_alias: /evaluate
contract_version: 1

input_artifacts:
  - type: TaskManifest
    schema: task-manifest.schema.v1
    required: true
  - type: GrillRecord
    schema: grill.schema.v1
    required: true
  - type: PlanArtifact
    schema: plan.schema.v1
    required: true
  - type: ExecutionRecord
    schema: execution-checkpoint.schema.v1
    required: true
  - type: VerificationRecord
    schema: verification.schema.v1
    required: true
  - type: ReviewRecord
    schema: review.schema.v1
    required: true

output_artifacts:
  - type: EvaluationRecord
    schema: evaluation.schema.v1
    required: true

required_validators:
  before:
    - validate-artifact
    - validate-manifest
  after:
    - validate-artifact
    - validate-evaluation-gate

authority:
  may_create:
    - EvaluationRecord
  may_modify:
    - TaskManifest
  may_read:
    - TaskManifest
    - GrillRecord
    - PlanArtifact
    - ExecutionRecord
    - VerificationRecord
    - ReviewRecord
  forbidden:
    - edit_source_files
    - modify_manifest
    - modify_schemas
    - modify_policies
    - self_confirm_evaluation
    - bypass_validation

semantics:
  required:
    - read_task_manifest_first_skip_if_not_completed
    - compute_criteria_satisfaction_rate_from_criteria_outcomes
    - classify_outcome_using_declared_rules
    - write_evaluation_record_with_status_draft
    - present_human_evaluation_block_for_confirmation
    - update_task_manifest_phase_to_evaluated
