command_contract_id: grill.v1
stable_alias: /grill
contract_version: 1

input_artifacts: []

output_artifacts:
  - type: GrillRecord
    schema: grill.schema.v1
    required: true
  - type: TaskManifest
    schema: task-manifest.schema.v1
    required: true

required_validators:
  after:
    - validate-artifact
    - validate-artifact-path

authority:
  may_create:
    - GrillRecord
    - TaskManifest
  may_modify: []
  may_read:
    - task_scope_files_only
  forbidden:
    - edit_source_files
    - modify_manifest
    - modify_schemas
    - modify_policies
    - scan_whole_repo
    - bypass_validation

semantics:
  required:
    - ask_one_question_at_a_time
    - provide_recommended_answer_per_question
    - capture_approach_decisions_with_alternatives_rejected
    - record_decision_proceed_or_stop
    - save_grill_record_to_task_folder
    - create_task_manifest_at_task_birth
