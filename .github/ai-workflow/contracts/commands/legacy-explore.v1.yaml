command_contract_id: legacy-explore.v1
stable_alias: /legacy-explore
contract_version: 1

input_artifacts:
  - type: GrillRecord
    schema: grill.schema.v1
    required: true

output_artifacts:
  - type: LegacyExplorationRecord
    schema: legacy-explore.schema.v1
    required: true

required_validators:
  before:
    - validate-artifact
  after:
    - validate-artifact

authority:
  may_create:
    - LegacyExplorationRecord
  may_modify: []
  may_read:
    - GrillRecord
    - bounded_related_files_only
  forbidden:
    - edit_source_files
    - scan_whole_repo
    - modify_manifest
    - modify_schemas
    - modify_policies
    - bypass_validation

semantics:
  required:
    - run_only_when_ambiguity_or_legacy_triggers_fire
    - keep_search_bounded_to_implicated_modules
    - record_findings_risks_and_recommended_scope
    - save_exploration_record_to_task_folder
