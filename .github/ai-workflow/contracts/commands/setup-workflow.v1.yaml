command_contract_id: setup-workflow.v1
stable_alias: /setup-workflow
contract_version: 1

input_artifacts: []

output_artifacts:
  - type: workflow_config
    schema: config.schema.v1
    required: true

required_validators:
  after:
    - validate-manifest
    - validate-config

authority:
  may_create:
    - workflow_config
  may_modify:
    - .github/workflow/config.yaml
  may_read:
    - repo_layout
    - build_files
  forbidden:
    - edit_source_files
    - modify_manifest
    - modify_schemas
    - modify_policies
    - ask_user_for_values
    - bypass_validation

semantics:
  required:
    - auto_detect_tech_stack_from_build_files
    - populate_all_project_and_commands_fields
    - write_workflow_config_yaml_only
    - output_status_block_after_write
