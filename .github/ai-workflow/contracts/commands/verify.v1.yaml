command_contract_id: verify.v1
stable_alias: /verify
contract_version: 1

input_artifacts:
  - type: PlanArtifact
    schema: plan.schema.v1
    required: true
  - type: ExecutionRecord
    schema: execution-checkpoint.schema.v1
    required: true

output_artifacts:
  - type: VerificationRecord
    schema: verification.schema.v1
    required: true

required_validators:
  before:
    - validate-artifact
  after:
    - validate-artifact
    - validate-artifact-path
    - validate-criteria-coverage

authority:
  may_create:
    - VerificationRecord
  may_modify:
    - TaskManifest
  may_read:
    - PlanArtifact
    - ExecutionRecord
    - changed_files
  forbidden:
    - edit_source_files
    - modify_schemas
    - modify_policies
    - claim_verified_without_command_output
    - bypass_validation

semantics:
  required:
    - run_verification_command_from_plan_verbatim
    - record_command_output_verbatim
    - never_claim_verified_without_real_output
    - save_verification_record_to_task_folder
    - update_task_manifest_phase_and_artifact_refs
