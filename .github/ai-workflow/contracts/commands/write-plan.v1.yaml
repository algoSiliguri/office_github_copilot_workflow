command_contract_id: write-plan.v1
stable_alias: /write-plan
contract_version: 1

input_artifacts:
  - type: GrillRecord
    schema: grill.schema.v1
    required: true

output_artifacts:
  - type: PlanArtifact
    schema: plan.schema.v1
    required: true

required_validators:
  before:
    - validate-artifact
  after:
    - validate-artifact
    - validate-plan-scope

authority:
  may_create:
    - PlanArtifact
  may_modify: []
  may_read:
    - GrillRecord
    - files_declared_in_grill_record_approach
  forbidden:
    - edit_source_files
    - modify_manifest
    - modify_schemas
    - modify_policies
    - plan_files_not_in_grill_scope
    - bypass_validation

semantics:
  required:
    - ground_plan_in_grill_record
    - declare_files_in_scope_and_out_of_scope
    - declare_context_packet_requirement
    - declare_preferred_surface_per_step
    - refuse_if_grill_decision_is_not_proceed
    - save_plan_to_task_folder
