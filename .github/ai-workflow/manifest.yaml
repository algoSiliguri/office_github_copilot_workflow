# Machine-readable registry for CLI validators and tooling only.
# Not loaded by Copilot. Copilot reads .github/copilot-instructions.md instead.
manifest_version: 1
workflow_contract_version: 1
supported_manifest_versions:
  - 1

runtime:
  root: .github/ai-workflow
  bootstrap_validator: .github/ai-workflow/validators/bootstrap
  config: .github/workflow/config.yaml

paths:
  contracts_root: .github/ai-workflow/contracts
  schemas_root: .github/ai-workflow/schemas
  policies_root: .github/ai-workflow/policies
  skills_root: .github/ai-workflow/skills
  protocols_root: .github/ai-workflow/protocols
  validators_root: .github/ai-workflow/validators
  artifacts_root: .github/tasks
  logs_root: .github/tasks/TASK-{NNN}/logs

commands:
  /setup-workflow:
    contract: setup-workflow.v1
    file: .github/ai-workflow/contracts/commands/setup-workflow.v1.yaml
    allowed_predecessors: []
    required_inputs: []
    conditional_inputs: []
    produces:
      - workflow_config
    may_edit_source: false
    may_search_outside_plan_files: true
    allowed_handoffs:
      - /grill
      - /quick-task
  /grill:
    contract: grill.v1
    file: .github/ai-workflow/contracts/commands/grill.v1.yaml
    allowed_predecessors:
      - /setup-workflow
    required_inputs: []
    conditional_inputs: []
    produces:
      - GrillRecord
    may_edit_source: false
    may_search_outside_plan_files: false
    allowed_handoffs:
      - /legacy-explore
      - /write-plan
  /legacy-explore:
    contract: legacy-explore.v1
    file: .github/ai-workflow/contracts/commands/legacy-explore.v1.yaml
    allowed_predecessors:
      - /grill
    required_inputs:
      - GrillRecord
    conditional_inputs: []
    produces:
      - LegacyExplorationRecord
    may_edit_source: false
    may_search_outside_plan_files: true
    allowed_handoffs:
      - /write-plan
  /quick-task:
    contract: quick-task.v1
    file: .github/ai-workflow/contracts/commands/quick-task.v1.yaml
    allowed_predecessors:
      - /setup-workflow
    required_inputs: []
    conditional_inputs: []
    produces:
      - QuickTaskRecord
    may_edit_source: true
    may_search_outside_plan_files: false
    allowed_handoffs:
      - /grill
  /write-plan:
    contract: write-plan.v1
    file: .github/ai-workflow/contracts/commands/write-plan.v1.yaml
    allowed_predecessors:
      - /grill
    required_inputs:
      - GrillRecord
    conditional_inputs:
      - LegacyExplorationRecord
    produces:
      - PlanArtifact
    may_edit_source: false
    may_search_outside_plan_files: false
    allowed_handoffs:
      - /context-packet
      - /execute-plan
  /context-packet:
    contract: context-packet.v1
    file: .github/ai-workflow/contracts/commands/context-packet.v1.yaml
    allowed_predecessors:
      - /write-plan
    required_inputs:
      - PlanArtifact
    conditional_inputs: []
    produces:
      - ContextPacketArtifact
    may_edit_source: false
    may_search_outside_plan_files: true
    allowed_handoffs:
      - /execute-plan
  /execute-plan:
    contract: execute-plan.v1
    file: .github/ai-workflow/contracts/commands/execute-plan.v1.yaml
    allowed_predecessors:
      - /write-plan
      - /context-packet
    required_inputs:
      - PlanArtifact
    conditional_inputs:
      - ContextPacketArtifact
    produces:
      - ExecutionRecord
    may_edit_source: true
    may_search_outside_plan_files: false
    allowed_handoffs:
      - /verify
  /verify:
    contract: verify.v1
    file: .github/ai-workflow/contracts/commands/verify.v1.yaml
    allowed_predecessors:
      - /execute-plan
    required_inputs:
      - PlanArtifact
      - ExecutionRecord
    conditional_inputs: []
    produces:
      - VerificationRecord
    may_edit_source: false
    may_search_outside_plan_files: false
    allowed_handoffs:
      - /review
  /review:
    contract: review.v1
    file: .github/ai-workflow/contracts/commands/review.v1.yaml
    allowed_predecessors:
      - /verify
    required_inputs:
      - PlanArtifact
      - ExecutionRecord
      - VerificationRecord
    conditional_inputs: []
    produces:
      - ReviewRecord
    may_edit_source: false
    may_search_outside_plan_files: false
    allowed_handoffs:
      - /evaluate
  /evaluate:
    contract: evaluate.v1
    file: .github/ai-workflow/contracts/commands/evaluate.v1.yaml
    allowed_predecessors:
      - /review
    required_inputs:
      - TaskManifest
      - GrillRecord
      - PlanArtifact
      - ExecutionRecord
      - VerificationRecord
      - ReviewRecord
    conditional_inputs: []
    produces:
      - EvaluationRecord
    may_edit_source: false
    may_search_outside_plan_files: false
    allowed_handoffs: []

schemas:
  grill: .github/ai-workflow/schemas/grill.schema.json
  legacy_explore: .github/ai-workflow/schemas/legacy-explore.schema.json
  manifest: .github/ai-workflow/schemas/manifest.schema.json
  command_contract: .github/ai-workflow/schemas/command-contract.schema.json
  config: .github/ai-workflow/schemas/config.schema.json
  quick_task: .github/ai-workflow/schemas/quick-task.schema.json
  plan: .github/ai-workflow/schemas/plan.schema.json
  context_packet: .github/ai-workflow/schemas/context-packet.schema.json
  execution_checkpoint: .github/ai-workflow/schemas/execution-checkpoint.schema.json
  verification: .github/ai-workflow/schemas/verification.schema.json
  review: .github/ai-workflow/schemas/review.schema.json
  task_manifest: .github/ai-workflow/schemas/task-manifest.schema.json
  evaluation: .github/ai-workflow/schemas/evaluation.schema.json

policies:
  context: .github/ai-workflow/policies/context-policy.v1.yaml
  quick_task: .github/ai-workflow/policies/quick-task-policy.v1.yaml
  workflow: .github/ai-workflow/policies/workflow-policy.v1.yaml
  retrieval: .github/ai-workflow/policies/retrieval-policy.v1.yaml
  verification: .github/ai-workflow/policies/verification-policy.v1.yaml
  review: .github/ai-workflow/policies/review-policy.v1.yaml
  artifact_path: .github/ai-workflow/policies/artifact-path-policy.v1.yaml
  evaluation: .github/ai-workflow/policies/evaluation-policy.v1.yaml

validators:
  bootstrap: .github/ai-workflow/validators/bootstrap
  compatibility: .github/ai-workflow/validators/validate-compatibility
  config: .github/ai-workflow/validators/validate-config
  context_packet: .github/ai-workflow/validators/validate-context-packet
  manifest: .github/ai-workflow/validators/validate-manifest
  artifact: .github/ai-workflow/validators/validate-artifact
  artifact_path: .github/ai-workflow/validators/validate-artifact-path
  plan_scope: .github/ai-workflow/validators/validate-plan-scope
  review_gate: .github/ai-workflow/validators/validate-review-gate
  quick_task_preclassify: .github/ai-workflow/validators/validate-quick-task-preclassify
  criteria_coverage: .github/ai-workflow/validators/validate-criteria-coverage
  evaluation_gate: .github/ai-workflow/validators/validate-evaluation-gate
