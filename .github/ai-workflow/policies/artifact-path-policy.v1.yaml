policy_id: artifact-path-policy.v1

runtime_root: .github/tasks
task_folder_pattern: "^TASK-[0-9]{3}$"
attempts_dirname: attempts
logs_dirname: logs

authoritative_filenames:
  DiagnosisRecord: diagnosis.json
  GrillRecord: grill.json
  LegacyExplorationRecord: legacy-exploration.json
  PlanArtifact: plan.json
  ContextPacketArtifact: context-packet.json
  ExecutionRecord: execution.json
  VerificationRecord: verification.json
  ReviewRecord: review.json
  EvaluationRecord: evaluation.json
  SystemEvaluationReport: system-evaluation.json
  FleetEvaluationReport: fleet-evaluation.json
  RawSourceReviewRecord: raw-source-review.json
  TaskManifest: task-manifest.json
  QuickTaskRecord: quick-task.json

system_evaluation_path:
  pattern: .github/tasks/system-evaluations/SYS-EVAL-{YYYYMMDD}-{HHMMSS}/system-evaluation.json

fleet_evaluation_path:
  pattern: .github/tasks/fleet-evaluations/FLEET-EVAL-{YYYYMMDD}-{HHMMSS}/fleet-evaluation.json

raw_source_review_path:
  pattern: .github/tasks/fleet-evaluations/FLEET-EVAL-{YYYYMMDD}-{HHMMSS}/raw-source-reviews/RAW-SOURCE-REVIEW-{YYYYMMDD}-{HHMMSS}/raw-source-review.json

rules:
  enforce_task_folder_root: true
  enforce_authoritative_filenames: true
  reject_misplaced_artifacts: true
  require_task_id_folder_match: true
