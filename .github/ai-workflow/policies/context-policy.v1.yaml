policy_id: context-policy.v1

required_execution_states:
  - not_required
  - packet_required_missing
  - packet_loaded_proceed
  - packet_refresh_required
  - packet_escalate

required_when:
  execution_modes:
    - phased-inline
    - phased-subagent
  retrieval_required: true

threshold_defaults:
  max_inline_files_without_packet: 3
  max_inline_modules_without_packet: 1
  max_out_of_plan_reads_without_packet: 0
