policy_id: retrieval-policy.v1

required_triggers:
  - unclear_target_files
  - incomplete_requirement_mapping
  - risky_boundary
  - ambiguity_marker
  - behavior_change_without_local_context

allowed_decisions:
  - used
  - skipped
  - unavailable

degraded_reasons:
  - stale_but_usable_context
  - incomplete_but_bounded_context
  - non_critical_conflict

blocked_reasons:
  - target_files_unknown
  - critical_conflict
  - no_verification_signal
  - invalid_spec
