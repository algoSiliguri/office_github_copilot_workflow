command_contract_id: review.v1
stable_alias: /review
contract_version: 1

input_artifacts:
  - type: PlanArtifact
    schema: plan.schema.v1
    required: true
  - type: ExecutionRecord
    schema: execution-checkpoint.schema.v1
    required: true
  - type: VerificationRecord
    schema: verification.schema.v1
    required: true

output_artifacts:
  - type: ReviewRecord
    schema: review.schema.v1
    required: true

required_validators:
  before:
    - validate-artifact
    - validate-review-gate
  after:
    - validate-artifact
    - validate-review-gate

authority:
  may_create:
    - ReviewRecord
  may_modify: []
  may_read:
    - PlanArtifact
    - ExecutionRecord
    - VerificationRecord
  forbidden:
    - edit_source_files
    - modify_manifest
    - modify_schemas
    - modify_policies
    - smooth_over_scope_drift
    - self_approve_review
    - bypass_validation

semantics:
  required:
    - diff_actual_changed_files_against_plan_scope
    - record_scope_violations
    - require_human_authorization_for_pass
    - save_review_record_to_task_folder
